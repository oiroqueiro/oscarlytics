{% extends 'base.html' %}

{% block content %}

<section class="section pt-5">
    <div class="container">
        <div class="row section pt-0">
            <div class="col-12 col-lg-6 mx-auto">

                <div class="mb-4">
                    <a href="{{ url_for('dashboard', lang=lang) }}" class="text-decoration-none text-muted">
                        <i class="fas fa-arrow-left"></i> {{ t.admin_back_dashboard }}
                    </a>
                </div>

                <h1 class="h2 fw-light mb-4">{{ t.admin_upload_title }}</h1>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <form action="" method="POST" enctype="multipart/form-data">
                            <div class="mb-4">
                                <label for="markdown_file" class="form-label text-muted">{{ t.admin_upload_select
                                    }}</label>
                                <input class="form-control" type="file" id="markdown_file" name="markdown_file"
                                    accept=".md" required>
                            </div>
                            <button type="submit" class="btn btn-primary px-4 py-2 w-100">{{ t.admin_upload_btn
                                }}</button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</section>

{% endblock %}
