    index:
      hello: Hey, I’m
      name: Oscar Iglesias
      subtitle: Welcome to my personal engineering and data lab. A space where I document my own projects in case you find them useful or inspiring.
    about:
      hello: Hello, I am Oscar Iglesias and this is my Personal Data Lab.
      parragraph1: "After more than two decades of a technical career evolving from **ERP** developing toward **Business Intelligence**, this space was born as a personal repository. Here, I document the implentation of <u>personal and functional proyects</u>, free from the constraints of corporate environments."
      parragraph2: "Professionally, my day-to-day combines strategic vision with hands-on execution. I like to maintain a hybrid profile that allows me to understand data throughout its entire lifecycle: from designing models in Power BI and reporting architectures to the SQL logic that ensures information is reliable and useful for decision-making."
      parragraph3: "This Lab is the environment where I deploy my preference for the **Open Source** ecosystem and **containerization** (Docker and Podman). I manage a distributed infrastructure connecting my local workstation (Ubuntu) with cloud nodes (Oracle OCI), a VPS server and even my mobile, creating the ecosystem needed for every projects to be fully operative."
      parragraph4: "What you will see are not theoretical exercises, but solutions with a real architecture and purpose. I invite you to explore the results in my projects section."
      parragraph5: ""
      parragraph6: ""
      skills_title: "🛠️ TECHNICAL PROFILE (SUMMARY)"
      skill1: "**Business Intelligence**: Data model design and reporting architectures with Power BI and SSRS (current). I have over 15 years of experience with SSRS (including reporting in Dynamics AX) and 13 years of experience in QlikView."
      skill2: "**Data management**: More than 20 years working with SQL engines (SQL Server, Oracle, MySQL, PostgreSQL) focused on reporting, ETL processes and business logic."
      skill3: "**Management Systems (ERP)**: +25 years of technical experience and functional in ERP ecosystems (Microsoft Dynamics NAV, AX, CRM and Oracle)."
      skill4: "**Lab Infrastructure**: Linux environments (Ubuntu), deployment with containers (Docker/Podman) and distributed nodes in OCI."
      youtube: ''
