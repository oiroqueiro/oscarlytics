    index:
      hello: Hola, soy
      name: Oscar Iglesias
      subtitle: Bienvenid@ a mi laboratorio de ingeniería y datos. Un espacio personal donde documento mis propios proyectos por si te son de utilidad o inspiración.
    about:
      hello: Hola, soy Oscar Iglesias y este es mi Personal Data Lab.
      parragraph1: "Tras más de dos décadas de trayectoria técnica evolucionando desde el desarrollo de sistemas **ERP** hacia el **Business Intelligence**, este espacio nace como un repositorio personal donde documento la implementación de <u>proyectos personales y funcionales</u>, fuera de las restricciones de los entornos corporativos."
      parragraph2: "Profesionalmente, mi día a día combina la visión estratégica con la ejecución directa. Me gusta mantener un perfil híbrido que me permite entender el dato en todo su ciclo de vida: desde el diseño de modelos en Power BI y arquitecturas de reporting, hasta la lógica SQL que garantiza que la información sea fiable y útil para la toma de decisiones."
      parragraph3: "Este laboratorio es el entorno donde despliego mi preferencia por el ecosistema **Open Source** y la **containerización** (Docker y Podman). Gestiono una infraestructura distribuida que conecta mi estación de trabajo local (Ubuntu) con nodos en la nube (OCI de Oracle), un servidor VPS e incluso mi móvil, creando el ecosistema necesario para que cada desarrollo sea plenamente operativo."
      parragraph4: "Lo que verás aquí no son ejercicios teóricos, sino soluciones con una arquitectura y un propósito real detrás. Te invito a explorar los resultados en mi sección de proyectos."
      parragraph5: ""
      parragraph6: ""
      skills_title: "🛠️ PERFIL TÉCNICO (RESUMEN)"
      skill1: "**Business Intelligence**: Diseño de modelos de datos y arquitecturas de reporting con Power BI y SSRS (actualmente). Cuento con más de 15 años de experiencia acumulada con SSRS (incluyendo reporting en Dynamics AX) y 13 años en soluciones QlikView."
      skill2: "**Gestión de Datos**: Más de 20 años trabajando con motores SQL (SQL Server, Oracle, MySQL, PostgreSQL) enfocados a informes, procesos ETL y lógica de negocio."
      skill3: "**Sistemas de Gestión**: +25 años de experiencia técnica y funcional en ecosistemas ERP (Microsoft Dynamics NAV, AX, CRM y Oracle)."
      skill4: "**Infraestructura del Lab**: Gestión de entornos Linux (Ubuntu), despliegue mediante contenedores (Docker/Podman) y nodos distribuidos en OCI."
      youtube: ''
    contact:
      title: Arquitectura y Feedback
      subtitle: Estos proyectos nacen de la curiosidad y de las ganas de implementar nuevas funcionalidades o mejorar procesos. Si te han servido de referencia o quieres comentar algún detalle técnico de la arquitectura, estaré encantado de intercambiar impresiones contigo.
